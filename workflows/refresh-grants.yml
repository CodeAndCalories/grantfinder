name: Refresh Grants Data

on:
  # Runs every day at 7:00 AM UTC (after Grants.gov updates at ~6am UTC)
  schedule:
    - cron: '0 7 * * *'

  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  refresh:
    name: Download, Parse & Push Grants to KV
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repo so the script files are available
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install dependencies (adm-zip + wrangler)
      - name: Install dependencies
        working-directory: grants-worker
        run: npm install

      # 4. Install adm-zip (needed by seed.mjs)
      - name: Install adm-zip
        working-directory: grants-worker
        run: npm install adm-zip

      # 5. Run the seed script
      #    CLOUDFLARE_API_TOKEN is stored as a GitHub Secret (set up below)
      #    It lets wrangler push to your KV without interactive login
      - name: Run seed script
        working-directory: grants-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/seed.mjs

      # 6. Confirm success by hitting your Worker's /status endpoint
      - name: Verify KV was updated
        run: |
          echo "Checking Worker status..."
          curl -s https://grants-worker.axigamingclips.workers.dev/status | python3 -m json.tool
